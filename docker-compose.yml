# Local Postgres for development (matches the production database engine).
# Start it with:  docker compose up -d
# Then set DATABASE_URL in .env.local to:
#   postgresql://heirs:heirs@localhost:5432/heirs
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: heirs
      POSTGRES_PASSWORD: heirs
      POSTGRES_DB: heirs
    ports:
      - '5432:5432'
    volumes:
      - heirs_pgdata:/var/lib/postgresql/data

volumes:
  heirs_pgdata:
